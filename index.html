<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>今日心动指数 💓</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #f5f0f3 0%, #f0d9e5 40%, #e8c4d4 100%);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px 20px 40px;
      overflow-x: hidden;
      overflow-y: auto;
    }

    .float-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .float-bg .item {
      position: absolute;
      top: -30px;
      opacity: 0.18;
      animation: floatDown linear infinite;
    }
    @keyframes floatDown {
      0%   { transform: translateY(-30px) rotate(0deg); opacity: 0.18; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.95);
      border-radius: 24px;
      padding: 28px 24px 24px;
      width: 100%;
      max-width: 370px;
      box-shadow: 0 12px 40px rgba(180, 130, 160, 0.18), 0 2px 8px rgba(0,0,0,0.04);
      text-align: center;
      animation: cardIn 0.7s cubic-bezier(0.22, 1, 0.36, 1);
    }
    @keyframes cardIn {
      0%   { opacity: 0; transform: translateY(30px) scale(0.97); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .her-name {
      font-size: 12px;
      color: #b08a9e;
      letter-spacing: 3px;
      margin-bottom: 4px;
      font-weight: 500;
    }

    .date-text {
      font-size: 12px;
      color: #c9a0b5;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .title {
      font-size: 20px;
      font-weight: 700;
      color: #a04060;
      margin-bottom: 4px;
      line-height: 1.4;
      cursor: default;
      user-select: none;
      -webkit-user-select: none;
      padding: 4px 8px;
      border-radius: 12px;
      transition: background 0.15s;
    }
    .title:active { background: rgba(200,80,120,0.06); }
    .title .beat {
      display: inline-block;
      animation: beat 1.2s ease-in-out infinite;
      font-size: 22px;
    }
    @keyframes beat {
      0%, 100% { transform: scale(1); }
      15%      { transform: scale(1.2); }
      30%      { transform: scale(1); }
    }

    /* 天数 + 倒计时合并行 */
    .day-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-bottom: 22px;
      font-size: 12px;
      color: #bbb;
    }
    .day-row .sep { color: #e0c8d4; font-size: 14px; }
    .day-tag {
      background: #fdf4f7;
      border-radius: 99px;
      padding: 4px 14px;
      color: #c7507a;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .day-tag.countdown {
      background: #fef5e7;
      color: #c08850;
    }
    .day-tag.milestone {
      background: #ffeef4;
      color: #c7507a;
      font-weight: 700;
      animation: pulseTag 1.5s ease-in-out infinite;
    }
    @keyframes pulseTag {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.05); }
    }

    .heart-meter { margin-bottom: 22px; }
    .meter-label {
      font-size: 13px;
      color: #888;
      margin-bottom: 8px;
      display: flex;
      justify-content: center;
      align-items: baseline;
      gap: 6px;
    }
    .meter-label .num {
      font-size: 36px;
      font-weight: 800;
      color: #c7507a;
      font-style: italic;
      font-family: "DIN", "PingFang SC", sans-serif;
      line-height: 1;
    }
    .meter-label .unit {
      font-size: 14px;
      color: #c7507a;
      font-weight: 600;
    }
    .meter-bar {
      height: 14px;
      background: #f3e8ee;
      border-radius: 99px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s;
    }
    .meter-bar:active { transform: scaleY(1.3); }
    .meter-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #d98fa9, #c7507a, #e86080);
      transition: width 1.8s cubic-bezier(0.22, 1, 0.36, 1);
      width: 0%;
      position: relative;
    }
    .meter-fill.pulse {
      animation: barPulse 0.4s ease;
    }
    @keyframes barPulse {
      0%   { filter: brightness(1); }
      50%  { filter: brightness(1.6); }
      100% { filter: brightness(1); }
    }
    .meter-bar .tap-heart {
      position: absolute;
      font-size: 18px;
      pointer-events: none;
      animation: tapFloat 1s ease-out forwards;
      z-index: 10;
      font-weight: 700;
    }
    @keyframes tapFloat {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-50px) scale(0.5); }
    }
    .meter-interact-label {
      font-size: 11px;
      color: #b8a0ae;
      margin-top: 4px;
      min-height: 30px;
      letter-spacing: 0;
    }
    .meter-interact-label .tap-count {
      color: #c7507a;
      font-weight: 700;
      font-size: 13px;
    }
    .meter-interact-label .tap-bonus {
      color: #e89fb5;
      font-weight: 600;
    }

    .quote-box {
      background: #fdf8fa;
      border-left: 3px solid #d98fa9;
      border-radius: 0 16px 16px 0;
      padding: 18px 20px;
      margin-bottom: 22px;
      text-align: left;
      min-height: 72px;
      display: flex;
      align-items: center;
    }
    .quote-text {
      font-size: 14.5px;
      color: #6b3a50;
      line-height: 1.7;
      font-weight: 450;
      animation: fadeUp 0.5s ease;
    }
    @keyframes fadeUp {
      0%   { opacity: 0; transform: translateY(8px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .btn-group {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 12px;
    }
    .btn {
      border: none;
      border-radius: 99px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
    }
    .btn:active { transform: scale(0.96); }

    .btn-primary {
      background: linear-gradient(135deg, #c7507a, #b8406a);
      color: #fff;
      box-shadow: 0 3px 12px rgba(199, 80, 122, 0.3);
      flex: 1;
    }

    .response-area {
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .response-text {
      font-size: 13px;
      color: #a04060;
      font-weight: 500;
      animation: popIn 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }
    @keyframes popIn {
      0%   { opacity: 0; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }
    .hidden { display: none !important; }

    .refresh-btn {
      background: none;
      border: 1.5px dashed #d98fa9;
      border-radius: 99px;
      padding: 8px 24px;
      color: #b87090;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s;
      margin: 0 auto 18px;
      display: block;
    }
    .refresh-btn:active { background: #fdf8fa; }

    /* ========== 悄悄话信箱 ========== */
    .notes-section {
      border-top: 1px solid #f3e8ee;
      padding-top: 16px;
      margin-bottom: 2px;
    }
    .notes-label {
      font-size: 12px;
      color: #b8a0ae;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }
    .notes-input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 6px;
    }
    .notes-input {
      flex: 1;
      border: 1.5px solid #eedde6;
      border-radius: 99px;
      padding: 8px 16px;
      font-size: 13px;
      color: #6b3a50;
      background: #fdf8fa;
      outline: none;
      transition: border 0.2s;
      font-family: inherit;
    }
    .notes-input:focus { border-color: #d98fa9; }
    .notes-input::placeholder { color: #d4c0cc; }
    .notes-send-btn {
      border: none;
      border-radius: 99px;
      background: linear-gradient(135deg, #d98fa9, #c7507a);
      color: #fff;
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .notes-send-btn:active { transform: scale(0.95); }
    .notes-sent-toast {
      font-size: 12px;
      color: #c7507a;
      min-height: 18px;
      font-weight: 500;
      animation: popIn 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      margin-bottom: 4px;
    }
    .notes-list {
      max-height: 140px;
      overflow-y: auto;
      text-align: left;
    }
    .note-item {
      background: #fdf8fa;
      border-radius: 10px;
      padding: 8px 12px;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      animation: fadeUp 0.3s ease;
    }
    .note-item .note-text {
      font-size: 12px;
      color: #6b3a50;
      line-height: 1.5;
      flex: 1;
    }
    .note-item .note-date {
      font-size: 10px;
      color: #c9a8b8;
      white-space: nowrap;
      padding-top: 2px;
    }
    .note-empty {
      font-size: 11px;
      color: #d4c0cc;
      text-align: center;
      padding: 6px 0;
    }

    /* ========== 彩蛋弹窗 ========== */
    .easter-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.35);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: overlayIn 0.3s ease;
    }
    @keyframes overlayIn {
      0%   { opacity: 0; }
      100% { opacity: 1; }
    }
    .easter-card {
      background: #fff;
      border-radius: 20px;
      padding: 32px 26px 26px;
      max-width: 310px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      animation: easterBounce 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    }
    @keyframes easterBounce {
      0%   { transform: scale(0.5); opacity: 0; }
      70%  { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }
    .easter-icon {
      font-size: 40px;
      margin-bottom: 12px;
      animation: beat 1s ease-in-out 3;
    }
    .easter-title {
      font-size: 16px;
      color: #c7507a;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .easter-msg {
      font-size: 14px;
      color: #6b3a50;
      line-height: 1.8;
      margin-bottom: 20px;
      text-align: left;
    }
    .easter-close {
      background: linear-gradient(135deg, #c7507a, #b8406a);
      color: #fff;
      border: none;
      border-radius: 99px;
      padding: 10px 30px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 600;
    }
    .easter-close:active { transform: scale(0.96); }

    /* 粒子 */
    .particles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 100;
    }
    .particle {
      position: absolute;
      font-size: 20px;
      animation: particleFly 0.9s ease-out forwards;
    }
    @keyframes particleFly {
      0%   { opacity: 1; transform: translate(0,0) scale(1); }
      100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.3); }
    }

    .footer {
      margin-top: 2px;
      font-size: 10px;
      color: #ddd;
      letter-spacing: 1px;
    }

    /* ========== 时段问候 ========== */
    .greeting {
      font-size: 13px;
      color: #c7507a;
      font-weight: 600;
      margin-bottom: 10px;
      animation: fadeUp 0.6s ease;
    }

    /* ========== 满100庆祝 ========== */
    .celebrate-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.4);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: overlayIn 0.3s ease;
    }
    .celebrate-card {
      background: #fff;
      border-radius: 24px;
      padding: 32px 24px 28px;
      max-width: 300px;
      width: 88%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      animation: easterBounce 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .celebrate-icon {
      font-size: 52px;
      margin-bottom: 10px;
    }
    .celebrate-title {
      font-size: 20px;
      color: #c7507a;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .celebrate-msg {
      font-size: 14px;
      color: #6b3a50;
      line-height: 1.7;
      margin-bottom: 18px;
    }
    .celebrate-close {
      background: linear-gradient(135deg, #c7507a, #b8406a);
      color: #fff;
      border: none;
      border-radius: 99px;
      padding: 10px 30px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 600;
    }
    .celebrate-close:active { transform: scale(0.96); }

    /* 庆祝撒花 */
    .confetti-container {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 301;
    }
    .confetti-piece {
      position: absolute;
      top: -40px;
      font-size: 22px;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
      70%  { opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg) scale(0.4); opacity: 0; }
    }
  </style>
</head>
<body>

<div class="float-bg" id="floatBg"></div>
<div class="particles" id="particles"></div>

<div class="card">
  <div class="her-name">TO · 雨婷</div>
  <div class="greeting" id="greetingText"></div>
  <div class="date-text" id="dateText"></div>

  <!-- 标题：连续点3次触发彩蛋 -->
  <div class="title" id="titleEl"><span class="beat">💓</span> 今日心动指数</div>

  <!-- 天数 + 倒计时 -->
  <div class="day-row">
    <span class="day-tag">认识第 <span id="dayCount">--</span> 天</span>
    <span class="sep">·</span>
    <span class="day-tag countdown" id="countdownTag">距 100 天还有 <span id="countdownDays">--</span> 天</span>
  </div>

  <div class="heart-meter">
    <div class="meter-label">
      <span class="num" id="heartNum">0</span><span class="unit">%</span>
    </div>
    <div class="meter-bar" id="meterBar">
      <div class="meter-fill" id="meterFill"></div>
    </div>
    <div class="meter-interact-label" id="meterInteract"></div>
  </div>

  <div class="quote-box">
    <div class="quote-text" id="quoteText"></div>
  </div>

  <div class="btn-group">
    <button class="btn btn-primary" id="btnMeToo" onclick="onMeToo()">我也这么觉得</button>
  </div>

  <div class="response-area">
    <div class="response-text hidden" id="responseText"></div>
  </div>

  <button class="refresh-btn" onclick="refresh()">换一句话</button>

  <!-- ========== 悄悄话信箱 ========== -->
  <div class="notes-section">
    <div class="notes-label">💌 想对他说的话</div>
    <div class="notes-input-row">
      <input class="notes-input" id="notesInput" type="text" placeholder="写点什么..." maxlength="60" onkeydown="if(event.key==='Enter')sendNote()">
      <button class="notes-send-btn" onclick="sendNote()">寄出</button>
    </div>
    <div class="notes-sent-toast" id="notesToast"></div>
    <div class="notes-list" id="notesList"></div>
  </div>

  <div class="footer">— 用心准备的小惊喜 —</div>
</div>

<!-- 彩蛋弹窗 -->
<div class="easter-overlay hidden" id="easterOverlay" onclick="closeEaster(event)">
  <div class="easter-card" onclick="event.stopPropagation()">
    <div class="easter-icon">🕵️‍♀️</div>
    <div class="easter-title">你发现了我的秘密 🎁</div>
    <div class="easter-msg" id="easterMsg"></div>
    <button class="easter-close" onclick="closeEaster()">🍬 偷偷收好</button>
  </div>
</div>

<!-- 庆祝弹窗 -->
<div class="celebrate-overlay hidden" id="celebrateOverlay">
  <div class="confetti-container" id="confettiContainer"></div>
  <div class="celebrate-card">
    <div class="celebrate-icon">🎉</div>
    <div class="celebrate-title">心动值满了！</div>
    <div class="celebrate-msg" id="celebrateMsg">今天的你让心动指数直接拉满了 💯<br>—— 这大概就是心动的感觉吧 🌸</div>
    <button class="celebrate-close" onclick="closeCelebrate()">✨ 收到</button>
  </div>
</div>

<script>
  // ============ 配置 ============
  const START_DATE = new Date("2026-04-27");
  const DAYS_100 = new Date("2026-04-27");
  DAYS_100.setDate(DAYS_100.getDate() + 99); // 第 100 天 = 2026-08-04

  // ============ 情话库 ============
  const quotes = [
    "今天看到一个很有意思的事，第一反应是——要是你在旁边，我就能跟你讲了。",
    "你认真做事的样子，真的很好看。",
    "我今天忍住了好几次想找你聊天的冲动，你猜我成功了吗？",
    "发现一件可怕的事：我好像越来越习惯有你在了。",
    "你今天过得怎么样？说真的，我想听你讲讲。",
    "有人说，人一天会想 60 遍想见的人——我今天肯定超了。",
    "你有没有觉得，我们在一起聊天的时候，时间过得特别快？",
    "我不知道这是不是喜欢，但我知道——想到你的时候，我是开心的。",
    "今天的风很舒服，突然想起你说过你喜欢这种天气。",
    "你吃饭了吗？我认真的，希望你照顾好自己。",
    "有些话当面说会不好意思，但我还是想让你知道。",
    "如果以后可以经常见面，那应该会很有意思吧。",
    "你不在的时候，我才会发现你在我日常里出现了多少次。",
    "我今天做了一件蠢事——看到好笑的东西，下意识想发给你。",
    "你说话的方式很特别，让我觉得很舒服。",
    "我最近在想，你是不是也偶尔会想到我？",
    "你给我的感觉，跟别人不太一样。说不上来，但就是不一样。",
    "如果可以，我想把今天多延长一会儿——跟你多聊几句那种。",
    "你有没有被人说过，你笑起来让人觉得很安心？",
    "我不太会说好听的话，但我想跟你在一起的时间，是真的开心。",
    "今天有个瞬间，我在想——要是你在就好了。",
    "你是我最近聊天列表里，点开最多次的名字。",
    "我们应该多见面，光聊天总觉得不够。",
    "你有没有发现，我们好像越来越有默契了？",
    "说实话，我有点期待每天跟你说话的时间。",
    "你今天喝水了吗？别嫌我烦，我是认真的。",
    "我喜欢跟你聊天——不是客套，是真的喜欢。",
    "你给我的回复，我每条都认真看了不止一遍。",
    "如果暧昧有声音，大概就是我们聊天时的那种感觉吧。",
    "我在想，再过一段时间，我会不会更想见你。好像现在已经很想了。",
  ];

  const meTooResponses = [
    "那……我们好像想到一起去了 😊",
    "你这么说，我今天心情会很好",
    "看来不是我一个人这么想",
    "收到，偷偷开心一下",
    "你真好",
    "那改天见面说？",
    "我也这么觉得——对你",
    "那我们挺有默契的嘛",
  ];

  // 彩蛋内容：每天随机一句（用日期做种子，同一天看到的彩蛋一样）
  const easterMessages = [
    "有些话不好意思当面讲，所以藏这里啦——认识你之后，我的每一天都变得特别起来。谢谢你的出现，雨婷。",
    "被你找到啦！其实我每天都在期待跟你聊天的那一刻，像一天里的小太阳。",
    "嘘——这个秘密只有你知道：我最近很开心，因为你在我生活里。",
    "如果心动有进度条，你大概已经把它拉满了。只是我还在等一个合适的时机，告诉你。",
    "你知道为什么做了这个页面吗？因为我总想为你做点什么，哪怕只是一个让你笑一下的小东西。",
    "我在想，100 天的时候送你点什么。如果你看到这段话，可以偷偷给我一点提示吗？",
  ];

  // ============ 工具函数 ============
  function seedRandom(seed) {
    let s = seed;
    return function() {
      s = (s * 16807) % 2147483647;
      return (s - 1) / 2147483646;
    };
  }

  function dateSeed() {
    const d = new Date();
    return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
  }

  function pick(arr, rng) {
    return arr[Math.floor(rng() * arr.length)];
  }

  function daysBetween(d1, d2) {
    return Math.round(Math.abs((d2 - d1) / 86400000));
  }

  // ============ 主逻辑 ============
  let currentRng = null;
  let quoteIndex = 0;
  let baseHeartValue = 0; // 当天基准心动值

  function init() {
    const now = new Date();
    const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
    document.getElementById('dateText').textContent =
      `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 星期${weekDays[now.getDay()]}`;

    const days = daysBetween(START_DATE, now);
    document.getElementById('dayCount').textContent = days;

    // 倒计时
    const remain = daysBetween(now, DAYS_100);
    const ctd = document.getElementById('countdownTag');
    if (remain <= 0) {
      ctd.className = 'day-tag milestone';
      ctd.innerHTML = '🎉 认识 100 天啦！';
    } else {
      document.getElementById('countdownDays').textContent = remain;
    }

    // 时段问候
    updateGreeting(now);

    // 页面首次渲染用日期种子（同一天打开看到的内容一致）
    currentRng = seedRandom(dateSeed());
    render();

    // 初始化悄悄话信箱
    initNotes();

    // 初始化进度条互动
    initMeterTap();

    // 初始化彩蛋
    initEaster();
  }

  function render() {
    const rng = currentRng;
    const baseHeart = Math.floor(rng() * 51) + 50;
    baseHeartValue = baseHeart;
    const taps = getTapCount();
    const displayValue = Math.min(baseHeart + taps * 0.1, 100);

    document.getElementById('heartNum').textContent = Number.isInteger(displayValue) ? displayValue : displayValue.toFixed(1);

    // 动画：先归零 → 再涨到最终值
    const fill = document.getElementById('meterFill');
    fill.style.transition = 'none';
    fill.style.width = '0%';
    fill.offsetHeight;
    fill.style.transition = 'width 1.8s cubic-bezier(0.22, 1, 0.36, 1)';
    requestAnimationFrame(function() {
      requestAnimationFrame(function() {
        fill.style.width = displayValue.toFixed(1) + '%';
      });
    });

    quoteIndex = Math.floor(rng() * quotes.length);
    document.getElementById('quoteText').textContent = quotes[quoteIndex];
    document.getElementById('responseText').classList.add('hidden');

    updateTapLabel(baseHeart, taps);
  }

  let refreshCount = 0;
  function refresh() {
    refreshCount++;
    let newIndex = (quoteIndex + 3 + refreshCount * 7) % quotes.length;
    newIndex = (newIndex + Math.floor(Math.random() * (quotes.length - 1))) % quotes.length;
    if (newIndex === quoteIndex) newIndex = (newIndex + 1) % quotes.length;
    quoteIndex = newIndex;
    const el = document.getElementById('quoteText');
    el.style.animation = 'none';
    el.offsetHeight;
    el.style.animation = 'fadeUp 0.5s ease';
    el.textContent = quotes[quoteIndex];
    document.getElementById('responseText').classList.add('hidden');
  }

  function onMeToo() {
    const resp = meTooResponses[Math.floor(Math.random() * meTooResponses.length)];
    const el = document.getElementById('responseText');
    el.textContent = resp;
    el.classList.remove('hidden');
    spawnParticles();
  }

  function spawnParticles() {
    const container = document.getElementById('particles');
    const emojis = ['💕', '🌸', '✨', '😊', '💗'];
    const btn = document.getElementById('btnMeToo');
    const rect = btn.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    for (let i = 0; i < 8; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      const angle = (Math.PI * 2 * i) / 8;
      const dist = 60 + Math.random() * 50;
      p.style.left = cx + 'px';
      p.style.top = cy + 'px';
      p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
      p.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
      container.appendChild(p);
      setTimeout(() => p.remove(), 900);
    }
  }

  // ============ 进度条戳一戳互动 ============
  function getTodayKey() {
    const d = new Date();
    return '' + d.getFullYear() + (d.getMonth()+1).toString().padStart(2,'0') + d.getDate().toString().padStart(2,'0');
  }

  function getTapCount() {
    return parseInt(localStorage.getItem('heart_taps_' + getTodayKey()) || '0');
  }

  function saveTapCount(n) {
    localStorage.setItem('heart_taps_' + getTodayKey(), n.toString());
  }

  function updateTapLabel(baseHeart, taps) {
    const el = document.getElementById('meterInteract');
    if (taps > 0) {
      const result = Math.min(baseHeart + taps * 0.1, 100);
      const resultStr = Number.isInteger(result) ? result : result.toFixed(1);
      el.innerHTML = baseHeart + '% <span class="tap-bonus">+</span> 戳了 <span class="tap-count">' + taps + '</span> 次 <span class="tap-bonus">=</span> <span class="tap-count">' + resultStr + '%</span>';
    } else {
      el.innerHTML = '👆 戳一戳进度条，心动值会涨哦';
    }
  }

  function initMeterTap() {
    updateTapLabel(baseHeartValue, getTapCount());

    const bar = document.getElementById('meterBar');
    bar.addEventListener('click', function(e) {
      e.stopPropagation();
      const taps = getTapCount() + 1;
      saveTapCount(taps);

      // 重新计算并执行动画
      const displayValue = Math.min(baseHeartValue + taps * 0.1, 100);
      document.getElementById('heartNum').textContent = Number.isInteger(displayValue) ? displayValue : displayValue.toFixed(1);

      const fill = document.getElementById('meterFill');
      fill.style.transition = 'width 0.5s cubic-bezier(0.22, 1, 0.36, 1)';
      fill.style.width = displayValue.toFixed(1) + '%';

      // 脉冲
      fill.classList.remove('pulse');
      void fill.offsetWidth;
      fill.classList.add('pulse');

      updateTapLabel(baseHeartValue, taps);

      // 戳满 100% 庆祝
      if (displayValue >= 100 && !getCelebrated()) {
        setCelebrated();
        showCelebrate();
      }

      // 从点击位置冒出 +1
      const rect = bar.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const heart = document.createElement('div');
      heart.className = 'tap-heart';
      heart.textContent = '+1 💓';
      heart.style.left = x + 'px';
      heart.style.top = y + 'px';
      bar.appendChild(heart);
      setTimeout(function() { heart.remove(); }, 1000);
    });
  }

  // ============ 悄悄话信箱 ============
  function initNotes() {
    renderNotes();
  }

  function sendNote() {
    const input = document.getElementById('notesInput');
    const text = input.value.trim();
    if (!text) return;

    const now = new Date();
    const dateStr = `${now.getMonth()+1}/${now.getDate()} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;

    let notes = JSON.parse(localStorage.getItem('secret_notes') || '[]');
    notes.unshift({ text, date: dateStr, ts: Date.now() });
    if (notes.length > 20) notes = notes.slice(0, 20); // 最多保留 20 条
    localStorage.setItem('secret_notes', JSON.stringify(notes));

    input.value = '';
    const toast = document.getElementById('notesToast');
    toast.textContent = '✉️ 已寄出';
    toast.style.animation = 'none';
    toast.offsetHeight;
    toast.style.animation = 'popIn 0.4s cubic-bezier(0.22, 1, 0.36, 1)';

    renderNotes();
  }

  function renderNotes() {
    const notes = JSON.parse(localStorage.getItem('secret_notes') || '[]');
    const list = document.getElementById('notesList');
    if (notes.length === 0) {
      list.innerHTML = '<div class="note-empty">还没有小纸条，写一句吧</div>';
      return;
    }
    list.innerHTML = notes.slice(0, 5).map(n =>
      `<div class="note-item">
        <span class="note-text">${escapeHTML(n.text)}</span>
        <span class="note-date">${n.date}</span>
      </div>`
    ).join('');
  }

  function escapeHTML(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ============ 隐藏彩蛋 ============
  let easterClicks = 0;
  let easterTimer = null;

  function initEaster() {
    const titleEl = document.getElementById('titleEl');
    titleEl.addEventListener('click', function() {
      easterClicks++;
      if (easterTimer) clearTimeout(easterTimer);
      if (easterClicks >= 3) {
        easterClicks = 0;
        showEaster();
        return;
      }
      easterTimer = setTimeout(function() { easterClicks = 0; }, 2500);
    });
  }

  function showEaster() {
    const msg = easterMessages[Math.floor(dateSeed() % easterMessages.length)];
    document.getElementById('easterMsg').textContent = msg;
    document.getElementById('easterOverlay').classList.remove('hidden');
  }

  function closeEaster(event) {
    if (event && event.target !== document.getElementById('easterOverlay')) return;
    document.getElementById('easterOverlay').classList.add('hidden');
  }

  // ============ 飘落背景 ============
  function spawnFloating() {
    const bg = document.getElementById('floatBg');
    const items = ['♡', '◌', '～', '·'];
    for (let i = 0; i < 10; i++) {
      const h = document.createElement('div');
      h.className = 'item';
      h.textContent = items[Math.floor(Math.random() * items.length)];
      h.style.left = Math.random() * 100 + '%';
      h.style.fontSize = (10 + Math.random() * 10) + 'px';
      h.style.color = '#d98fa9';
      h.style.animationDuration = (8 + Math.random() * 10) + 's';
      h.style.animationDelay = (Math.random() * 12) + 's';
      bg.appendChild(h);
    }
  }

  // ============ 时段问候 ============
  function updateGreeting(now) {
    const h = now.getHours();
    let msg;
    if (h >= 5 && h < 10)      msg = '早安 ☀️  今天也要元气满满';
    else if (h >= 10 && h < 12) msg = '上午好 🌤️  忙完了吗';
    else if (h >= 12 && h < 14) msg = '中午好 🍚  记得好好吃饭';
    else if (h >= 14 && h < 18) msg = '下午好 ☕  今天累不累';
    else if (h >= 18 && h < 22) msg = '晚上好 🌙  今天过得开心吗';
    else                        msg = '夜深了 ✨  看完早点休息';
    document.getElementById('greetingText').textContent = msg;
  }

  // ============ 戳满100%庆祝 ============
  function getCelebrated() {
    return localStorage.getItem('celebrated_' + getTodayKey()) === '1';
  }
  function setCelebrated() {
    localStorage.setItem('celebrated_' + getTodayKey(), '1');
  }

  function showCelebrate() {
    document.getElementById('celebrateOverlay').classList.remove('hidden');
    const container = document.getElementById('confettiContainer');
    const emojis = ['🎉', '🌸', '✨', '💯', '💕', '🎊', '💗', '🥳'];
    for (let i = 0; i < 30; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      piece.style.left = Math.random() * 100 + '%';
      piece.style.fontSize = (16 + Math.random() * 16) + 'px';
      piece.style.animationDuration = (2 + Math.random() * 3) + 's';
      piece.style.animationDelay = Math.random() * 1 + 's';
      container.appendChild(piece);
      setTimeout(function() { piece.remove(); }, 4000);
    }
  }

  function closeCelebrate() {
    document.getElementById('celebrateOverlay').classList.add('hidden');
  }

  spawnFloating();
  init();
</script>
</body>
</html>
