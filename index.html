<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>今日心动指数 💓</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #f5f0f3 0%, #f0d9e5 40%, #e8c4d4 100%);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow: hidden;
    }

    /* 飘落小元素背景 */
    .float-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .float-bg .item {
      position: absolute;
      top: -30px;
      opacity: 0.18;
      animation: floatDown linear infinite;
    }
    @keyframes floatDown {
      0%   { transform: translateY(-30px) rotate(0deg); opacity: 0.18; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.95);
      border-radius: 24px;
      padding: 32px 26px 30px;
      width: 100%;
      max-width: 370px;
      box-shadow: 0 12px 40px rgba(180, 130, 160, 0.18), 0 2px 8px rgba(0,0,0,0.04);
      text-align: center;
      animation: cardIn 0.7s cubic-bezier(0.22, 1, 0.36, 1);
    }
    @keyframes cardIn {
      0%   { opacity: 0; transform: translateY(30px) scale(0.97); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .her-name {
      font-size: 12px;
      color: #b08a9e;
      letter-spacing: 3px;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .date-text {
      font-size: 12px;
      color: #c9a0b5;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .title {
      font-size: 20px;
      font-weight: 700;
      color: #a04060;
      margin-bottom: 4px;
      line-height: 1.4;
    }
    .title .beat {
      display: inline-block;
      animation: beat 1.2s ease-in-out infinite;
      font-size: 22px;
    }
    @keyframes beat {
      0%, 100% { transform: scale(1); }
      15%      { transform: scale(1.2); }
      30%      { transform: scale(1); }
    }

    .subtitle {
      font-size: 12px;
      color: #bbb;
      margin-bottom: 26px;
    }

    /* 心动指数 */
    .heart-meter {
      margin-bottom: 26px;
    }
    .meter-label {
      font-size: 13px;
      color: #888;
      margin-bottom: 10px;
      display: flex;
      justify-content: center;
      align-items: baseline;
      gap: 6px;
    }
    .meter-label .num {
      font-size: 36px;
      font-weight: 800;
      color: #c7507a;
      font-style: italic;
      font-family: "DIN", "PingFang SC", sans-serif;
      line-height: 1;
    }
    .meter-label .unit {
      font-size: 14px;
      color: #c7507a;
      font-weight: 600;
    }
    .meter-bar {
      height: 10px;
      background: #f3e8ee;
      border-radius: 99px;
      overflow: hidden;
    }
    .meter-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #d98fa9, #c7507a, #e86080);
      transition: width 1.8s cubic-bezier(0.22, 1, 0.36, 1);
      width: 0%;
    }
    .meter-tip {
      font-size: 11px;
      color: #c9a8b8;
      margin-top: 8px;
      min-height: 16px;
    }

    /* 话的区域 */
    .quote-box {
      background: #fdf8fa;
      border-left: 3px solid #d98fa9;
      border-radius: 0 16px 16px 0;
      padding: 20px 22px;
      margin-bottom: 26px;
      text-align: left;
      min-height: 80px;
      display: flex;
      align-items: center;
    }
    .quote-text {
      font-size: 15px;
      color: #6b3a50;
      line-height: 1.75;
      font-weight: 450;
      animation: fadeUp 0.5s ease;
    }
    @keyframes fadeUp {
      0%   { opacity: 0; transform: translateY(8px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* 按钮 */
    .btn-group {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 16px;
    }
    .btn {
      border: none;
      border-radius: 99px;
      padding: 11px 22px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
    }
    .btn:active { transform: scale(0.96); }

    .btn-primary {
      background: linear-gradient(135deg, #c7507a, #b8406a);
      color: #fff;
      box-shadow: 0 3px 12px rgba(199, 80, 122, 0.3);
      flex: 1;
      justify-content: center;
    }

    /* 回应区 */
    .response-area {
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      margin-bottom: 14px;
    }
    .response-text {
      font-size: 14px;
      color: #a04060;
      font-weight: 500;
      animation: popIn 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }
    @keyframes popIn {
      0%   { opacity: 0; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }
    .hidden { display: none !important; }

    /* 换一换 */
    .refresh-btn {
      background: none;
      border: 1.5px dashed #d98fa9;
      border-radius: 99px;
      padding: 9px 26px;
      color: #b87090;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s;
      margin: 0 auto;
      display: block;
    }
    .refresh-btn:active { background: #fdf8fa; }

    .footer {
      margin-top: 20px;
      font-size: 10px;
      color: #ddd;
      letter-spacing: 1px;
    }

    /* 粒子 */
    .particles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 100;
    }
    .particle {
      position: absolute;
      font-size: 20px;
      animation: particleFly 0.9s ease-out forwards;
    }
    @keyframes particleFly {
      0%   { opacity: 1; transform: translate(0,0) scale(1); }
      100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.3); }
    }
  </style>
</head>
<body>

<div class="float-bg" id="floatBg"></div>
<div class="particles" id="particles"></div>

<div class="card">
  <div class="her-name">TO · 雨婷</div>
  <div class="date-text" id="dateText"></div>
  <div class="title"><span class="beat">💓</span> 今日心动指数</div>
  <div class="subtitle">认识第 <span id="dayCount">--</span> 天</div>

  <div class="heart-meter">
    <div class="meter-label">
      <span class="num" id="heartNum">0</span><span class="unit">%</span>
    </div>
    <div class="meter-bar">
      <div class="meter-fill" id="meterFill"></div>
    </div>
    <div class="meter-tip" id="meterTip"></div>
  </div>

  <div class="quote-box">
    <div class="quote-text" id="quoteText"></div>
  </div>

  <div class="btn-group">
    <button class="btn btn-primary" id="btnMeToo" onclick="onMeToo()">
      我也这么觉得
    </button>
  </div>

  <div class="response-area">
    <div class="response-text hidden" id="responseText"></div>
  </div>

  <button class="refresh-btn" onclick="refresh()">换一句话</button>

  <div class="footer">— 用心准备的小惊喜 —</div>
</div>

<script>
  // ============ 配置：你们认识的起始日期 ============
  // 请修改为你们第一次认识/聊天的日期
  const START_DATE = new Date("2026-04-27"); // 认识第1天

  // ============ 情话库（真诚克制，适合务实的她）============
  const quotes = [
    "今天看到一个很有意思的事，第一反应是——要是你在旁边，我就能跟你讲了。",
    "你认真做事的样子，真的很好看。",
    "我今天忍住了好几次想找你聊天的冲动，你猜我成功了吗？",
    "发现一件可怕的事：我好像越来越习惯有你在了。",
    "你今天过得怎么样？说真的，我想听你讲讲。",
    "有人说，人一天会想 60 遍想见的人——我今天肯定超了。",
    "你有没有觉得，我们在一起聊天的时候，时间过得特别快？",
    "我不知道这是不是喜欢，但我知道——想到你的时候，我是开心的。",
    "今天的风很舒服，突然想起你说过你喜欢这种天气。",
    "你吃饭了吗？我认真的，希望你照顾好自己。",
    "有些话当面说会不好意思，但我还是想让你知道。",
    "如果以后可以经常见面，那应该会很有意思吧。",
    "你不在的时候，我才会发现你在我日常里出现了多少次。",
    "我今天做了一件蠢事——看到好笑的东西，下意识想发给你。",
    "你说话的方式很特别，让我觉得很舒服。",
    "我最近在想，你是不是也偶尔会想到我？",
    "你给我的感觉，跟别人不太一样。说不上来，但就是不一样。",
    "如果可以，我想把今天多延长一会儿——跟你多聊几句那种。",
    "你有没有被人说过，你笑起来让人觉得很安心？",
    "我不太会说好听的话，但我想跟你在一起的时间，是真的开心。",
    "今天有个瞬间，我在想——要是你在就好了。",
    "你是我最近聊天列表里，点开最多次的名字。",
    "我们应该多见面，光聊天总觉得不够。",
    "你有没有发现，我们好像越来越有默契了？",
    "说实话，我有点期待每天跟你说话的时间。",
    "你今天喝水了吗？别嫌我烦，我是认真的。",
    "我喜欢跟你聊天——不是客套，是真的喜欢。",
    "你给我的回复，我每条都认真看了不止一遍。",
    "如果暧昧有声音，大概就是我们聊天时的那种感觉吧。",
    "我在想，再过一段时间，我会不会更想见你。好像现在已经很想了。",
  ];

  // 她点"我也这么觉得"后的回应（克制、真诚）
  const meTooResponses = [
    "那……我们好像想到一起去了 😊",
    "你这么说，我今天心情会很好",
    "看来不是我一个人这么想",
    "收到，偷偷开心一下",
    "你真好",
    "那改天见面说？",
    "我也这么觉得——对你",
    "那我们挺有默契的嘛",
  ];

  const tips = [
    "指数还不错，今天适合多聊几句",
    "超过 85 了，你懂的 😏",
    "心动不可耻，可耻的是不行动",
    "暧昧期最美好，但也别拖太久哦",
    "她在等你主动",
    "今天也好好照顾她",
    "真诚一点，她会感受到的",
  ];

  // ============ 工具函数 ============
  function seedRandom(seed) {
    let s = seed;
    return function() {
      s = (s * 16807) % 2147483647;
      return (s - 1) / 2147483646;
    };
  }

  function dateSeed() {
    const d = new Date();
    return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
  }

  function pick(arr, rng) {
    return arr[Math.floor(rng() * arr.length)];
  }

  function daysBetween(d1, d2) {
    const oneDay = 24 * 60 * 60 * 1000;
    return Math.round(Math.abs((d2 - d1) / oneDay));
  }

  // ============ 主逻辑 ============
  let currentRng = null;
  let quoteIndex = 0;

  function init() {
    // 日期
    const now = new Date();
    const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
    const dateStr = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 星期${weekDays[now.getDay()]}`;
    document.getElementById('dateText').textContent = dateStr;

    // 认识天数
    const days = daysBetween(START_DATE, now);
    document.getElementById('dayCount').textContent = days;

    // 用日期做种子
    currentRng = seedRandom(dateSeed());
    render();
  }

  function render() {
    const rng = currentRng;

    // 心动指数：65~98（暧昧期，留一点空间）
    const heartValue = Math.floor(rng() * 34) + 65;
    document.getElementById('heartNum').textContent = heartValue;

    setTimeout(() => {
      document.getElementById('meterFill').style.width = heartValue + '%';
    }, 300);

    document.getElementById('meterTip').textContent = pick(tips, rng);

    quoteIndex = Math.floor(rng() * quotes.length);
    document.getElementById('quoteText').textContent = quotes[quoteIndex];

    document.getElementById('responseText').classList.add('hidden');
  }

  let refreshCount = 0;

  function refresh() {
    refreshCount++;
    // 用刷新次数做偏移，确保每次都能跳到不同的句子
    let newIndex = (quoteIndex + 3 + refreshCount * 7) % quotes.length;
    // 再叠加 Math.random 微调，确保相邻点击不走同一条路径
    newIndex = (newIndex + Math.floor(Math.random() * (quotes.length - 1))) % quotes.length;
    if (newIndex === quoteIndex) newIndex = (newIndex + 1) % quotes.length;
    quoteIndex = newIndex;
    const el = document.getElementById('quoteText');
    el.style.animation = 'none';
    el.offsetHeight;
    el.style.animation = 'fadeUp 0.5s ease';
    el.textContent = quotes[quoteIndex];

    document.getElementById('responseText').classList.add('hidden');
  }

  function onMeToo() {
    // 直接用 Math.random，每次都是真正随机的
    const resp = meTooResponses[Math.floor(Math.random() * meTooResponses.length)];
    const el = document.getElementById('responseText');
    el.textContent = resp;
    el.classList.remove('hidden');
    spawnParticles();
  }

  function spawnParticles() {
    const container = document.getElementById('particles');
    const emojis = ['💕', '🌸', '✨', '😊', '💗'];
    const btn = document.getElementById('btnMeToo');
    const rect = btn.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;

    for (let i = 0; i < 8; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      const angle = (Math.PI * 2 * i) / 8;
      const dist = 60 + Math.random() * 50;
      p.style.left = cx + 'px';
      p.style.top = cy + 'px';
      p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
      p.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
      container.appendChild(p);
      setTimeout(() => p.remove(), 900);
    }
  }

  // ============ 飘落背景元素 ============
  function spawnFloating() {
    const bg = document.getElementById('floatBg');
    const items = ['♡', '◌', '～', '·'];
    for (let i = 0; i < 10; i++) {
      const h = document.createElement('div');
      h.className = 'item';
      h.textContent = items[Math.floor(Math.random() * items.length)];
      h.style.left = Math.random() * 100 + '%';
      h.style.fontSize = (10 + Math.random() * 10) + 'px';
      h.style.color = '#d98fa9';
      h.style.animationDuration = (8 + Math.random() * 10) + 's';
      h.style.animationDelay = (Math.random() * 12) + 's';
      bg.appendChild(h);
    }
  }

  spawnFloating();
  init();
</script>
</body>
</html>
